<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Library</title>
    <link rel="icon" href="./assets/icons/readingsIcon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Digital Library</h1>

      <p id="intro">
        What I've read, what I'll read, and what I'm reading, plus some
        thoughts.
      </p>

      <hr />

      <div class="bookShelf">
        <div class="booksData">
          <p>
            Harry Potter and the Sorcerer's Stone <br />
            J. K. Rowling
          </p>
        </div>
        <a
          href="https://www.goodreads.com/book/show/3.Harry_Potter_and_the_Sorcerer_s_Stone?ref=nav_sb_ss_1_35"
          target="_blank"
          ><img
            src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1474154022i/3.jpg"
            alt="Cover of Harry Potter and the Sorcerer's Stone"
            width="150"
        /></a>
        <div class="status">
          <p>Status: Reading</p>
        </div>
      </div>

      <div class="bookShelf">
        <div class="booksData">
          <p>
            1984 <br />
            G. Orwell
          </p>
        </div>
        <a
          href="https://www.goodreads.com/book/show/59014627-1984"
          target="_blank"
          ><img
            src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1631884170i/59014627.jpg"
            alt="Cover of 1984"
            width="150"
        /></a>
        <div class="status">
          <p>Status: Reading</p>
        </div>
      </div>

      <h2>Credits</h2>

      <ol>
        <li>
          <a href="https://www.flaticon.com/free-icons/book" title="book icons"
            >Book icons created by mikan933 - Flaticon</a
          >
        </li>
      </ol>
    </main>
  </body>
</html>
