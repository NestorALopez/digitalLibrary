<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Library</title>
    <link rel="icon" href="./assets/icons/readingsIcon.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <h1>Digital Library</h1>

      <p id="intro">
        What I've read, what I'll read, and what I'm reading, plus some
        thoughts.
      </p>

      <hr />

      <div class="bookShelf">
        <div class="booksData">
          <p class="bookTitle">Harry Potter and the Sorcerer's Stone</p>
          <p class="bookAuthor">J. K. Rowling</p>
        </div>
        <a
          href="https://www.goodreads.com/book/show/3.Harry_Potter_and_the_Sorcerer_s_Stone?ref=nav_sb_ss_1_35"
          target="_blank"
          ><img
            src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1682045100i/61780045.jpg"
            alt="Cover of Harry Potter and the Sorcerer's Stone"
            height="250px"
        /></a>
        <div class="status">
          <p>Status: Reading</p>
        </div>
      </div>

      <div class="bookShelf">
        <div class="bookData">
          <p class="bookTitle">1984</p>
          <p class="bookAuthor">George Orwell</p>
        </div>
        <a
          href="https://www.goodreads.com/book/show/59014627-1984"
          target="_blank"
          ><img
            src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1631884170i/59014627.jpg"
            alt="Cover of 1984"
            height="250px"
        /></a>
        <div class="status">
          <p>Status: Reading</p>
        </div>
      </div>

      <h2>Credits</h2>

      <ol>
        <li>
          <a href="https://www.flaticon.com/free-icons/book" title="book icons"
            >Book icons created by mikan933 - Flaticon</a
          >
        </li>
      </ol>
    </main>
  </body>
</html>
