<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Digital Library</title>
    <link rel="icon" href="./assets/icons/readingsIcon.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container content">
      <h1 class="item title">Welcome to my digital library!</h1>
      <p class="item intro">
        What I've read, what I'm reading and what I'll read, plus some thoughts.
      </p>

      <div class="container selector">
        <a class="status-anchor" href="">
          <p class="item selector">Read</p>
        </a>
        <a class="status-anchor" href="">
          <p class="item selector">Reading</p>
        </a>
        <a class="status-anchor" href="">
          <p class="item selector">Will read</p>
        </a>
      </div>
    </main>
  </body>
</html>
