<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading</title>
    <link rel="icon" href="./assets/icons/readingsIcon.png" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

  <body id="reading-page">
    <main class="container content">
      <h1 class="item title">Reading</h1>

      <div class="item container bookshelf">
        <div class="item container book">
          <div class="item book-cover">
            <a
              href="https://www.goodreads.com/book/show/3.Harry_Potter_and_the_Sorcerer_s_Stone?ref=nav_sb_ss_1_35"
              target="_blank"
            >
              <img
                src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1682045100i/61780045.jpg"
                alt="Cover of Harry Potter and the Sorcerer's Stone"
                height="250px"
              />
            </a>
          </div>
          <div class="item container book-data">
            <p class="item book-title">Harry Potter and the Sorcerer's Stone</p>
            <p class="item book-author">J. K. Rowling</p>
            <p class="item book-status">Reading</p>
          </div>
        </div>

        <div class="item container book">
          <div class="item book-cover">
            <a
              href="https://www.goodreads.com/book/show/59014627-1984"
              target="_blank"
            >
              <img
                src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1631884170i/59014627.jpg"
                alt="Cover of 1984"
                height="250px"
              />
            </a>
          </div>
          <div class="item container book-data">
            <p class="item book-title">1984</p>
            <p class="item book-author">George Orwell</p>
            <p class="item book-status">Reading</p>
          </div>
        </div>

        <div class="item container book">
          <div class="item book-cover">
            <a
              href="https://www.goodreads.com/book/show/45028173-h-bitos-at-micos?from_search=true&from_srp=true&qid=cThpw7cftH&rank=1"
              target="_blank"
            >
              <img
                src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1555084828i/45028173.jpg"
                alt="Cover of Hábitos atómicos"
                height="250px"
              />
            </a>
          </div>
          <div class="item container book-data">
            <p class="item book-title">Hábitos atómicos</p>
            <p class="item book-author">James Clear</p>
            <p class="item book-status">Reading</p>
          </div>
        </div>

        <div class="item container book">
          <div class="item book-cover">
            <a
              href="https://www.goodreads.com/book/show/80197961-aprende-a-cuidar-de-tu-ni-o-interior?from_search=true&from_srp=true&qid=mp4d5Y7GMc&rank=1"
              target="_blank"
            >
              <img
                src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1674074140i/80197961.jpg"
                alt="Cover of Aprende a cuidar de tu niño interior"
                height="250px"
              />
            </a>
          </div>
          <div class="item container book-data">
            <p class="item book-title">Aprende a cuidar de tu niño interior</p>
            <p class="item book-author">Jordi Gil Martín</p>
            <p class="item book-status">Reading</p>
